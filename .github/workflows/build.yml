name: Build VM images

on:
  push:
    branches: [master]
    paths:
      - 'images/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      win_version:
        description: 'Windows version key from dockur/windows define.sh (e.g. win11x64, win11x64-enterprise-iot-eval, win10x64-enterprise-ltsc-eval)'
        required: false
        default: 'win11x64-enterprise-iot-eval'
      win_iso_url:
        description: 'Override: explicit Windows ISO URL (skips auto-resolve)'
        required: false
        default: ''
      win_iso_sha256:
        description: 'Override: SHA256 (must be set if win_iso_url is)'
        required: false
        default: ''
      ubuntu_codename:
        description: 'Ubuntu codename (e.g. noble for 24.04, jammy for 22.04)'
        required: false
        default: 'noble'

env:
  REGISTRY: ghcr.io
  # GHCR requires lowercase. github.repository can be MixedCase.
  IMAGE_NAMESPACE: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ubuntu
            context: ./images/ubuntu
            image_suffix: ubuntu-24.04
            cache_mode: max
          - target: windows
            context: ./images/windows
            image_suffix: windows-11
            # mode=max caches the ISO download stage. Cold rebuilds are
            # ~5 min on the multi-connection download; warm rebuilds (when
            # only init scripts changed) skip the download entirely.
            # ~5 GB cached layer fits GHA's 10 GB per-repo quota.
            cache_mode: max

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          set -eux
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            /usr/local/share/powershell \
            /usr/local/lib/heroku \
            "$AGENT_TOOLSDIRECTORY" || true
          docker image prune -af || true
          docker builder prune -af || true
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lowercase the namespace once and reuse — GHCR rejects uppercase paths.
      - name: Compute image ref
        id: img
        run: |
          NS=$(echo "${{ env.IMAGE_NAMESPACE }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${{ env.REGISTRY }}/${NS}-${{ matrix.image_suffix }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Resolved image: ${IMAGE}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Compute build args
        id: args
        env:
          # Default Windows version when not running via workflow_dispatch.
          # Win 11 IoT Enterprise LTSC — smallest official Win11 ISO.
          DEFAULT_WIN_VERSION: win11x64-enterprise-iot-eval
        run: |
          set -eu

          # Build a list of KEY=VALUE pairs into a tmp file so we don't have
          # to worry about how multiline strings interact with YAML indentation.
          ARGS_FILE=$(mktemp)
          echo "GITHUB_REPOSITORY=${{ github.repository }}" >> "$ARGS_FILE"

          if [ "${{ matrix.target }}" = "ubuntu" ]; then
            CODENAME="${{ github.event.inputs.ubuntu_codename }}"
            CODENAME="${CODENAME:-noble}"
            echo "UBUNTU_CODENAME=${CODENAME}" >> "$ARGS_FILE"
          fi

          if [ "${{ matrix.target }}" = "windows" ]; then
            URL="${{ github.event.inputs.win_iso_url }}"
            SHA="${{ github.event.inputs.win_iso_sha256 }}"

            # If the user supplied an explicit URL, use it as-is. Otherwise,
            # resolve from dockur/windows' upstream define.sh — kept current
            # whenever Microsoft rotates an ISO.
            if [ -n "$URL" ]; then
              if [ -z "$SHA" ]; then
                echo "::error::win_iso_sha256 must be set when win_iso_url is overridden" >&2
                exit 1
              fi
              echo "Using user-supplied URL: $URL"
            else
              VER="${{ github.event.inputs.win_version }}"
              VER="${VER:-$DEFAULT_WIN_VERSION}"
              echo "Resolving ISO URL+SHA for version: $VER"

              DEFINE_SH=$(mktemp)
              curl -fsSL --retry 3 \
                https://raw.githubusercontent.com/dockur/windows/master/src/define.sh \
                -o "$DEFINE_SH"

              # Extract the case block matching the requested version key
              # *inside the getMido() function* — the version key appears
              # in several other places in define.sh that we must skip.
              BLOCK=$(awk -v ver="$VER" '
                /^getMido\(\)/                         { in_func=1; next }
                in_func && /^\}/                       { exit }
                in_func && $0 ~ "\""ver"\".*\\)"       { in_block=1 }
                in_block                               { print }
                in_block && /;;/                       { exit }
              ' "$DEFINE_SH")

              if [ -z "$BLOCK" ]; then
                echo "::error::version key '$VER' not found in upstream define.sh" >&2
                rm -f "$DEFINE_SH"
                exit 1
              fi

              URL=$(echo "$BLOCK" | awk -F'"' '/url=/ {print $2; exit}')
              SHA=$(echo "$BLOCK" | awk -F'"' '/sum=/ {print $2; exit}')
              rm -f "$DEFINE_SH"

              if [ -z "$URL" ] || [ -z "$SHA" ]; then
                echo "::error::failed to extract url/sum for '$VER' from upstream define.sh" >&2
                echo "::error::block was:" >&2
                echo "$BLOCK" >&2
                exit 1
              fi

              echo "Resolved URL: $URL"
              echo "Resolved SHA: $SHA"
            fi

            echo "WIN_ISO_URL=${URL}"    >> "$ARGS_FILE"
            echo "WIN_ISO_SHA256=${SHA}" >> "$ARGS_FILE"
          fi

          # Emit as a multiline GITHUB_OUTPUT value.
          {
            echo "build_args<<__EOF__"
            cat "$ARGS_FILE"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

          rm -f "$ARGS_FILE"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ steps.args.outputs.build_args }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=${{ matrix.cache_mode }},scope=${{ matrix.target }}

      # Print docker pull commands directly into the workflow run summary so
      # you don't need to dig into ghcr.io to find the image ref.
      - name: Job summary
        if: success() && github.event_name != 'pull_request'
        run: |
          {
            echo "### \`${{ matrix.target }}\` image"
            echo
            echo "Pushed tags:"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo
            echo "Pull:"
            echo '```bash'
            echo "docker pull ${{ steps.img.outputs.image }}:latest"
            echo '```'
            echo
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Disk space after build
        if: always()
        run: df -h /
